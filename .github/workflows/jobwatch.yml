name: JobWatch

on:
  schedule:
    # Every 30 min between ~08:00–18:00 Zagreb time.
    # GitHub cron is UTC; Croatia is UTC+2 (summer) / UTC+1 (winter).
    # This runs :00 and :30 past each hour from 06–16 UTC ≈ 08–18 local (summer).
    - cron: "0,30 6-16 * * *"
  workflow_dispatch: {}        # lets you trigger a run manually from the Actions tab

# Required so the job can push the updated seen.db back to the repo
permissions:
  contents: write

# Prevent overlapping runs from racing on seen.db
concurrency:
  group: jobwatch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright python-dotenv
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          HEADLESS: "1"
        run: python run.py

      - name: Commit updated seen.db
        run: |
          git config user.name  "jobwatch-bot"
          git config user.email "actions@github.com"
          # Only commit if seen.db actually changed
          if ! git diff --quiet -- seen.db 2>/dev/null || [ -n "$(git status --porcelain seen.db)" ]; then
            git add seen.db
            git commit -m "Update seen.db [skip ci]" || echo "nothing to commit"
            git push
          else
            echo "seen.db unchanged — nothing to commit"
          fi
