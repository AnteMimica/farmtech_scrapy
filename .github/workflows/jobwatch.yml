name: JobWatch

on:
  schedule:
    # Every 30 min, Mon–Fri, 06:00–16:30 UTC (≈ 08:00–18:30 Zagreb summer / 07:00–17:30 winter)
    - cron: "0,30 6-16 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: jobwatch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright python-dotenv twilio
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          TWILIO_TO: ${{ secrets.TWILIO_TO }}
          HEADLESS: "1"
        run: python run.py

      - name: Commit updated seen.db
        run: |
          git config user.name  "jobwatch-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet -- seen.db 2>/dev/null || [ -n "$(git status --porcelain seen.db)" ]; then
            git add seen.db
            git commit -m "Update seen.db [skip ci]" || echo "nothing to commit"
            git push
          else
            echo "seen.db unchanged — nothing to commit"
          fi
